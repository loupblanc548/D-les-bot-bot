name: Security Audit

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  audit:
    name: npm audit + eslint security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (0 vulnerabilities expected)
        run: npm audit --audit-level=moderate

      - name: ESLint security plugin
        run: npx eslint --plugin security --ext .ts src/
        continue-on-error: true
