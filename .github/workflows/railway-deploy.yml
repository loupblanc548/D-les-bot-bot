name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "prisma/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx vitest run --reporter=verbose
        continue-on-error: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service "${{ secrets.RAILWAY_SERVICE_ID }}" || echo "Deploy skipped (no token or service configured)"
      - name: Notify deployment
        if: always()
        run: |
          curl -H "Content-Type: application/json" -X POST -d "{\"content\":\"🚀 Bot deployed to Railway — ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}\"}" "${{ secrets.DISCORD_DEPLOY_WEBHOOK }}" || true
